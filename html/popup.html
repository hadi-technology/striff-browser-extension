<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Striffs</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 12px; width: 240px; }
    h3 { margin: 0 0 8px; font-size: 16px; }
    #status { margin: 6px 0 10px; }
    button { margin-top: 6px; padding: 6px 10px; cursor: pointer; }
    .row { margin-top: 10px; }
    .debug-label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .debug-note { margin: 4px 0 0 24px; color: #666; font-size: 12px; }
    small { color: #666; display: block; margin-top: 8px; }
  </style>
</head>
<body>
  <h3>Striffs Extension</h3>
  <p id="status" aria-live="polite">Checking token...</p>
  <button id="openOptionsBtn" type="button">Open Settings</button>
  <button id="resetCacheBtn" type="button">Clear Cache</button>
  <small>Tip: set your GitHub token in Settings.</small>
  <div class="row">
    <label class="debug-label" for="debugToggle">
      <input id="debugToggle" type="checkbox" />
      <span>Debug mode</span>
    </label>
  </div>

  <!-- MV3: no inline scripts; use external file -->
  <script src="../src/webext-shim.js"></script>
  <script src="popup.js" defer></script>
</body>
</html>
