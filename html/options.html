<!-- File: options.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Striffs Extension Settings</title>
</head>
<body>
  <h1>Striffs Settings</h1>

  <label for="ghToken">GitHub Token:</label><br />
  <input type="text" id="ghToken" placeholder="ghp_..." style="width: 400px;" />
  <button id="save">Save</button>

  <p id="status" style="margin-top:10px; color:green;"></p>

  <script>
    // Load stored token
    chrome.storage.sync.get(["ghToken"], (result) => {
      if (result.ghToken) {
        document.getElementById("ghToken").value = result.ghToken;
      }
    });

    // Save new token
    document.getElementById("save").onclick = () => {
      const token = document.getElementById("ghToken").value.trim();
      chrome.storage.sync.set({ ghToken: token }, () => {
        document.getElementById("status").textContent = "Token saved!";
      });
    };
  </script>
</body>
</html>
